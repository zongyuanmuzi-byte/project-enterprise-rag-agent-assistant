services:
  backend:
    build: .
    container_name: enterprise-rag-backend
    ports:
      - "8010:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: enterprise-rag-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8010
    depends_on:
      - backend
    restart: unless-stopped
